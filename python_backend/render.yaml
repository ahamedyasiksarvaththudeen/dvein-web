services:
  - type: web
    name: dvein-fastapi-backend
    runtime: python
    pythonVersion: "3.11.0"
    # Build frontend first (from project root), then install backend deps
    # Render root dir is assumed to be python_backend/
    buildCommand: cd ../frontend && npm install && npm run build && cd ../python_backend && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMAIL_USER
        sync: false          # SMTP login email (Brevo/Gmail/SendGrid)
      - key: EMAIL_PASS
        sync: false          # SMTP password / app password
      - key: SMTP_HOST
        sync: false          # Default: smtp-relay.brevo.com
      - key: SMTP_PORT
        sync: false          # Default: 587
      - key: COMPANY_EMAIL
        sync: false          # Inbox that receives form submissions
